name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'tests/**'
              - 'benches/**'
              - 'examples/**'
              - '.github/workflows/ci.yml'

  fmt:
    name: Format
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: [changes, fmt, clippy]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      needs.changes.outputs.code == 'true' &&
      (needs.fmt.result == 'success' || needs.fmt.result == 'skipped') &&
      (needs.clippy.result == 'success' || needs.clippy.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-nextest
      - run: cargo nextest run --all-features --tests

  coverage:
    name: Coverage
    needs: [changes, fmt, clippy]
    if: |
      always() &&
      needs.changes.outputs.code == 'true' &&
      (needs.fmt.result == 'success' || needs.fmt.result == 'skipped') &&
      (needs.clippy.result == 'success' || needs.clippy.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Get full history for changed files
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Get changed files
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | grep '^src/' || true)
          echo "changed<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      # PR: Quick coverage check without report (run tests for coverage)
      - name: Coverage (PR)
        if: github.event_name == 'pull_request'
        run: cargo llvm-cov --all-features --tests --no-report --ignore-run-fail
      # Main: Full coverage with lcov for badge
      - name: Coverage (Main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cargo llvm-cov --all-features --tests --lcov --output-path lcov.info --ignore-run-fail
      - uses: codecov/codecov-action@v6
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

  msrv:
    name: MSRV (1.87)
    needs: [changes, fmt, clippy]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      needs.changes.outputs.code == 'true' &&
      (needs.fmt.result == 'success' || needs.fmt.result == 'skipped') &&
      (needs.clippy.result == 'success' || needs.clippy.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features

  typos:
    name: Typos
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: crate-ci/typos@master
        with:
          config: .typos.toml

  # Aggregate gate: single required status check for branch protection.
  # Code jobs are path-filtered (skipped on docs-only PRs); rulesets treat a
  # skipped required check as *not satisfied*, which would block docs-only PRs
  # forever. This gate always runs and passes when every upstream job either
  # succeeded or was skipped, so the ruleset should require ONLY "CI Gate".
  ci-gate:
    name: CI Gate
    if: always()
    needs: [changes, fmt, clippy, test, coverage, msrv, typos]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs succeeded or were skipped
        env:
          CHANGES: ${{ needs.changes.result }}
          FMT: ${{ needs.fmt.result }}
          CLIPPY: ${{ needs.clippy.result }}
          TEST: ${{ needs.test.result }}
          COVERAGE: ${{ needs.coverage.result }}
          MSRV: ${{ needs.msrv.result }}
          TYPOS: ${{ needs.typos.result }}
        run: |
          fail=0
          for pair in "changes:$CHANGES" "fmt:$FMT" "clippy:$CLIPPY" "test:$TEST" "coverage:$COVERAGE" "msrv:$MSRV" "typos:$TYPOS"; do
            job="${pair%%:*}"
            res="${pair#*:}"
            if [ "$res" = "success" ] || [ "$res" = "skipped" ]; then
              echo "OK   $job = $res"
            else
              echo "FAIL $job = $res"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more required CI jobs did not succeed."
            exit 1
          fi
          echo "All required CI jobs passed or were skipped."

