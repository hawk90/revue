name: Framework Comparison Check

on:
  schedule:
    - cron: "0 9 1 */3 *"  # 분기별 (1월, 4월, 7월, 10월) 1일 9시 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Framework Version Check
    runs-on: ubuntu-latest
    outputs:
      is_stale: ${{ steps.verify.outputs.is_stale }}
    steps:
      - uses: actions/checkout@v6

      - name: Check framework versions
        run: |
          echo "## 🔍 Framework Comparison Check" >> $GITHUB_STEP_SUMMARY
          bash scripts/check-framework-versions.sh >> $GITHUB_STEP_SUMMARY 2>&1 || true

      - name: Check if comparison is stale
        id: verify
        run: |
          LAST_VERIFIED=$(grep -o 'Last verified: [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}' README.md 2>/dev/null | grep -o '[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}' || echo "")
          if [ -n "$LAST_VERIFIED" ]; then
            LAST_EPOCH=$(date -d "$LAST_VERIFIED" +%s 2>/dev/null || echo 0)
            NOW_EPOCH=$(date +%s)
            if [ "$LAST_EPOCH" -gt 0 ]; then
              DAYS_AGO=$(( (NOW_EPOCH - LAST_EPOCH) / 86400 ))
              echo "Days since last check: $DAYS_AGO" >> $GITHUB_STEP_SUMMARY
              if [ "$DAYS_AGO" -gt 90 ]; then
                echo "is_stale=true" >> $GITHUB_OUTPUT
              else
                echo "is_stale=false" >> $GITHUB_OUTPUT
              fi
            fi
          else
            echo "is_stale=true" >> $GITHUB_OUTPUT
          fi

  notify:
    name: Create Issue if Stale
    needs: check
    if: needs.check.outputs.is_stale == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create issue
        run: |
          EXISTING=$(gh issue list --label "documentation" --state open --search "Framework comparison" --json number --jq '.[0].number // empty')
          if [ -z "$EXISTING" ]; then
            gh issue create \
              --title "📊 Framework comparison table needs review" \
              --label "documentation,maintenance" \
              --body "$(cat <<'BODY'
The framework comparison table in README.md has not been verified in over 90 days.

**To update:**
1. Run `bash scripts/check-framework-versions.sh` to see latest versions
2. Review and update the comparison table in README.md
3. Update the `<!-- Last verified: YYYY-MM-DD -->` comment

**Current versions from crates.io/pypi will be shown in the workflow summary.**
BODY
)"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
